<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">
    <title>Movie List Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f5f7;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius:8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .formgroup {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .ratingstars {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .star {
            font-size: 30px;
            color: #d3d3d3;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .star.active {
            color: #ffcc00;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .movielistheader {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 15px;
            color: #333;
        }

        .movieitem {
            border: 1px solid #eee;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            background-color: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
        }

        .movieinfo {
            color: #333;
        }

        .liststars .starsmall {
            font-size: 18px;
            color: #d3d3d3;
        }

        .liststars .starsmall.active {
            color: #ffcc00;
        }

        .btndelete {
            background-color: #383838;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            width: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add a Movie</h2>

        <div class="formgroup">
            <label for="title">Title:</label>
            <input type="text" id="title">
        </div>

        <div class="formgroup">
            <label for="year">Year:</label>
            <input type="number" id="year">
        </div>

        <div class="formgroup">
            <label for="genre">Genre:</label>
            <select id="genre">
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Horror">Horror</option>
                <option value="Romance">Romance</option>
            </select>
        </div>

        <div class="formgroup">
            <label>Rating:</label>
            <div class="ratingstars" id="inputstars">
                <span class="star" data-value="1">&#9733;</span>
                <span class="star" data-value="2">&#9733;</span>
                <span class="star" data-value="3">&#9733;</span>
                <span class="star" data-value="4">&#9733;</span>
                <span class="star" data-value="5">&#9733;</span>
            </div>
        </div>

        <button id="addmoviebtn">Add Movie</button>

        <h2 class="movielistheader">Movie List</h2>

        <div id="movielistcontainer"></div>
    </div>

    <script>
        let currentrating = 0;
        const LOCAL_STORAGE_KEY = 'movies';

        const stars = document.querySelectorAll('#inputstars .star');
        const addmoviebtn = document.getElementById('addmoviebtn');
        const movielistcontainer = document.getElementById('movielistcontainer');

        stars.forEach(star => {
            star.addEventListener('click', (e) => {
                currentrating = parseInt(e.target.getAttribute('data-value'));
                updateInputStarsUI(currentrating);
            });
        });

        addmoviebtn.addEventListener('click', () => {
            const title = document.getElementById('title').value.trim();
            const year = document.getElementById('year').value.trim();
            const genre = document.getElementById('genre').value;

            if (!title || !year || currentrating === 0) {
                alert("Please fill in all fields and select a rating.");
                return;
            }

            const newmovie = {
                title: title,
                year: year,
                genre: genre,
                rating: currentrating
            };

            savemovie(newmovie);
            clearform();
            rendermovies();
        });

        function updateInputStarsUI(rating) {
            stars.forEach(star => {
                const starvalue = parseInt(star.getAttribute('data-value'));
                if (starvalue <= rating) {
                    star.classList.add('active'); }
                    else {
                        star.classList.remove('active');
                    }
            });
        };
        
        function savemovie(movieObj) {
            let movies = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
            const existingindex = movies.findIndex(m => m.title.toLowerCase() === movieObj.title.toLowerCase());
            if (existingindex !== -1) {
                const oldrating = parseFloat(movies[existingindex].rating);
                const newrating = (oldrating + movieObj.rating) / 2;
            movies[existingindex].year = movieObj.year;
            movies[existingindex].genre = movieObj.genre;
            movies[existingindex].rating = newrating.toFixed(1);
        } else {
            movies.push(movieObj);
        }
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(movies));
        }
        
        function deletemovie(index) {
            const movies = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
            const movietitle = movies[index].title;

            if (confirm(`Are you sure you want to delete "${movietitle}"?`)) {
                movies.splice(index, 1);

            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(movies));
                rendermovies();
            }
        }

        function rendermovies() {
            movielistcontainer.innerHTML = '';
            const movies = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];

            movies.forEach((movie, index) => {
                const moviediv = document.createElement('div');
                moviediv.className = 'movieitem';

                const infoSpan = document.createElement('span');
                infoSpan.className = 'movieinfo';
                infoSpan.textContent = `${movie.title} (${movie.year}) - ${movie.genre}, Rating: `;

                const starsSpan = document.createElement('span');
                starsSpan.className = 'liststars';
                starsSpan.innerHTML = generateListStarsHTML(parseInt(movie.rating));

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.className = 'btndelete';
                deleteBtn.onclick = () => deletemovie(index);

                moviediv.appendChild(infoSpan);
                moviediv.appendChild(starsSpan);
                moviediv.appendChild(deleteBtn);

                movielistcontainer.appendChild(moviediv);
            });
        }

        function generateListStarsHTML(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    html += '<span class="starsmall active">&#9733;</span>'; }
                    else {
                        html += '<span class="starsmall">&#9733;</span>';
                    }
                }
                return html;
            }

        function clearform() {
            document.getElementById('title').value = '';
            document.getElementById('year').value = '';
            document.getElementById('genre').selectedIndex = 0;
            currentrating = 0;
            updateInputStarsUI(0);
        }

        rendermovies();
    </script>
</body>
</html>
